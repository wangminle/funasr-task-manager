  <!-- Big progress bar -->
  <rect class="progress-bg" x="274" y="125" width="516" height="16" />
  <rect fill="#2563eb" x="274" y="125" width="351" height="16" rx="6" />
  <text fill="#1a202c" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" x="274" y="172">68%</text>
  <text fill="#2563eb" font-family="'Microsoft YaHei', sans-serif" font-size="16" x="330" y="172">预计剩余 12 分钟</text>
  <!-- Stage indicators -->
  <text class="file-info" x="274" y="198">待处理</text>
  <text class="file-info" x="330" y="198">预处理</text>
  <text class="file-info" x="405" y="198">排队中</text>
  <text class="file-info" x="468" y="198">已分配</text>
  <text fill="#2563eb" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" x="532" y="198">当前：识别中</text>
  <text class="file-info" x="620" y="198">已完成</text>
