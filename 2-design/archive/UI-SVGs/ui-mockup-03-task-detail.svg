  <text fill="#2563eb" font-family="'Microsoft YaHei', sans-serif" font-size="13" x="380" y="430">01J8K2MXYZ789ABC</text>
  <text class="label" x="274" y="455">创建时间</text>
  <text class="value" x="380" y="455">2026-02-26 10:30:15</text>
