  <rect class="card" x="250" y="484" width="560" height="200" />
  <text class="title" x="274" y="512">状态历史</text>
  <!-- Timeline items -->
  <circle cx="290" cy="540" r="6" fill="#38a169" />
  <line x1="290" y1="546" x2="290" y2="565" stroke="#e2e8f0" stroke-width="2" />
  <text class="file-info" x="310" y="535">10:30:15</text>
  <text class="value" x="390" y="535">PENDING · 任务已创建</text>
  <circle cx="290" cy="572" r="6" fill="#38a169" />
  <line x1="290" y1="578" x2="290" y2="597" stroke="#e2e8f0" stroke-width="2" />
  <text class="file-info" x="310" y="567">10:30:18</text>
  <text class="value" x="390" y="567">PREPROCESSING · 完成文件校验 (0.3s)</text>
  <circle cx="290" cy="604" r="6" fill="#38a169" />
  <line x1="290" y1="610" x2="290" y2="629" stroke="#e2e8f0" stroke-width="2" />
  <text class="file-info" x="310" y="599">10:30:19</text>
  <text class="value" x="390" y="599">QUEUED · 等待可用槽位（前方 3 个）</text>
  <circle cx="290" cy="636" r="6" fill="#38a169" />
  <line x1="290" y1="642" x2="290" y2="661" stroke="#e2e8f0" stroke-width="2" />
  <text class="file-info" x="310" y="631">10:31:05</text>
  <text class="value" x="390" y="631">DISPATCHED · 分配到 ASR-Server-01</text>
  <circle cx="290" cy="668" r="6" fill="#2563eb" />
  <text class="file-info" x="310" y="663">10:31:08</text>
  <text fill="#2563eb" font-family="'Microsoft YaHei', sans-serif" font-size="13" x="390" y="663">TRANSCRIBING · 识别中...</text>
  <!-- Right column: Transcript Preview -->
  <rect class="card" x="826" y="76" width="344" height="608" />
  <text class="title" x="850" y="104">转写结果预览</text>
  <!-- Download buttons -->
  <rect fill="#f0fff4" stroke="#38a169" x="850" y="115" width="55" height="24" rx="4" />
  <text fill="#276749" font-family="'Microsoft YaHei', sans-serif" font-size="11" x="877" y="131" text-anchor="middle">JSON</text>
  <rect fill="#f0fff4" stroke="#38a169" x="912" y="115" width="55" height="24" rx="4" />
  <text fill="#276749" font-family="'Microsoft YaHei', sans-serif" font-size="11" x="939" y="131" text-anchor="middle">TXT</text>
  <rect fill="#f0fff4" stroke="#38a169" x="974" y="115" width="55" height="24" rx="4" />
  <text fill="#276749" font-family="'Microsoft YaHei', sans-serif" font-size="11" x="1001" y="131" text-anchor="middle">SRT</text>
  <line class="divider" x1="850" y1="148" x2="1146" y2="148" />
  <!-- Transcript content -->
  <text class="timestamp" x="850" y="172">[00:00:01]</text>
  <text class="transcript-text" x="850" y="192">各位同事大家好，今天我们召开项目例会，</text>
  <text class="transcript-text" x="850" y="210">先同步一下上周进展和本周安排。</text>
  <text class="timestamp" x="850" y="240">[00:00:15]</text>
  <text class="transcript-text" x="850" y="260">第一，语音识别服务已经完成联调，</text>
  <text class="transcript-text" x="850" y="278">第二，前端页面进入稳定性测试阶段。</text>
  <text class="timestamp" x="850" y="308">[00:00:28]</text>
  <text class="transcript-text" x="850" y="328">当前剩余工作主要集中在异常处理，</text>
  <text class="transcript-text" x="850" y="346">包括重试策略、回调兜底和日志追踪。</text>
  <text class="transcript-text" x="850" y="364">预计本周内可以完成所有验收项...</text>
  <text class="timestamp" x="850" y="394">[00:01:05]</text>
  <text class="transcript-text" x="850" y="414">接下来请各模块负责人补充风险点，</text>
  <text class="transcript-text" x="850" y="432">并确认上线窗口和回滚预案。</text>
  <text class="transcript-text" x="850" y="450">谢谢。</text>
  <text class="timestamp" x="850" y="480">[00:01:32]</text>
  <text class="transcript-text" x="850" y="500">如果没有其他问题，今天会议到这里，</text>
  <text class="transcript-text" x="850" y="518">相关结论会在会后同步到任务系统。</text>
  <text class="transcript-text" x="850" y="536">完。</text>
  <!-- More indicator -->
  <text fill="#2563eb" font-family="'Microsoft YaHei', sans-serif" font-size="13" x="850" y="570">转写完成预计时间 [01:32:18]</text>
  <!-- Bottom action bar -->
  <rect class="card" x="250" y="700" width="920" height="50" />
  <rect fill="#2563eb" x="274" y="710" width="120" height="32" rx="6" />
  <text fill="#ffffff" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" x="334" y="731" text-anchor="middle">下载结果</text>
  <rect fill="#ffffff" stroke="#e53e3e" x="410" y="710" width="120" height="32" rx="6" />
  <text fill="#e53e3e" font-family="'Microsoft YaHei', sans-serif" font-size="13" x="470" y="731" text-anchor="middle">取消任务</text>
  <rect fill="#ffffff" stroke="#cbd5e0" x="546" y="710" width="120" height="32" rx="6" />
  <text fill="#4a5568" font-family="'Microsoft YaHei', sans-serif" font-size="13" x="606" y="731" text-anchor="middle">刷新状态</text>
  <text class="desc" x="710" y="870" text-anchor="middle">ASR 任务管理器 · 详情页 · UI Mockup v1.0</text>
