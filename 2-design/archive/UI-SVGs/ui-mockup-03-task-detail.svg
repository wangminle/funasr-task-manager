  <line x1="20" y1="55" x2="200" y2="55" stroke="#2d3e50" stroke-width="1" />
  <text class="sidebar-text" x="48" y="95">文件上传</text>
  <rect class="sidebar-active" x="12" y="105" width="196" height="40" />
  <text class="sidebar-active-text" x="48" y="130">任务列表</text>
  <text class="sidebar-text" x="48" y="175">系统监控</text>
  <text class="sidebar-text" x="48" y="210">设置中心</text>
  <line x1="20" y1="840" x2="200" y2="840" stroke="#2d3e50" stroke-width="1" />
