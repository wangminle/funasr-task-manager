  <text class="header-text" x="320" y="25">任务详情</text>
  <text fill="#1a202c" font-family="'Microsoft YaHei', sans-serif" font-size="14" x="250" y="48">01J8K2M · 会议录音-2026-02-25.wav</text>
  <!-- Back button -->
  <text fill="#2563eb" font-family="'Microsoft YaHei', sans-serif" font-size="13" x="1100" y="38">返回列表</text>
  <line class="divider" x1="220" y1="60" x2="1200" y2="60" />
  <!-- Left column: Info + Progress -->
  <!-- Status & Progress Card -->
  <rect class="card" x="250" y="76" width="560" height="180" />
