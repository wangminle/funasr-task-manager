  <text fill="#718096" font-family="'Microsoft YaHei', sans-serif" font-size="12" x="274" y="220">服务器：ASR-Server-01（WebSocket） · RTF: 0.45 · 已处理 92min / 预计 135min</text>
  <!-- File Info Card -->
  <rect class="card" x="250" y="270" width="560" height="200" />
  <text class="title" x="274" y="298">文件信息</text>
  <text class="label" x="274" y="330">文件名</text>
  <text class="value" x="380" y="330">会议录音-2026-02-25.wav</text>
  <text class="label" x="274" y="355">文件大小</text>
  <text class="value" x="380" y="355">356 MB</text>
  <text class="label" x="550" y="355">时长</text>
  <text class="value" x="620" y="355">02:15:30</text>
  <text class="label" x="274" y="380">格式</text>
  <text class="value" x="380" y="380">WAV (PCM 16-bit)</text>
  <text class="label" x="550" y="380">采样率</text>
  <text class="value" x="620" y="380">16000 Hz</text>
  <text class="label" x="274" y="405">声道</text>
