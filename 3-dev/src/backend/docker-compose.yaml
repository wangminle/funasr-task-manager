version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ASR_DATABASE_URL=${ASR_DATABASE_URL:-sqlite+aiosqlite:///./data/asr_tasks.db}
      - ASR_REDIS_URL=redis://redis:6379/0
      - ASR_LOG_FORMAT=json
      - ASR_LOG_LEVEL=INFO
    volumes:
      - app-data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.2.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- 可选: PostgreSQL (高并发场景替代 SQLite) ---
  # 启用方法:
  #   1. 创建 .env 文件，设置:
  #        POSTGRES_PASSWORD=your_secure_password
  #        ASR_DATABASE_URL=postgresql+asyncpg://asr:your_secure_password@postgres:5432/asr_tasks
  #   2. docker compose --profile postgres up -d
  #   3. web 服务会自动使用 .env 中的 ASR_DATABASE_URL 连接 PostgreSQL
  #   4. 首次启动需执行迁移: docker compose exec web alembic upgrade head
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD 环境变量}
      POSTGRES_DB: ${POSTGRES_DB:-asr_tasks}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asr}"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  app-data:
  redis-data:
  prometheus-data:
  grafana-data:
  postgres-data:
