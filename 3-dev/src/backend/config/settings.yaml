app:
  name: "ASR Task Manager"
  version: "0.1.0"
  debug: false
  log_level: "INFO"
  log_format: "console"
server:
  host: "0.0.0.0"
  port: 8000
database:
  url: "sqlite+aiosqlite:///runtime/storage/asr_tasks.db"
redis:
  url: "redis://localhost:6379/0"
storage:
  upload_dir: "runtime/storage/uploads"
  result_dir: "runtime/storage/results"
  temp_dir: "runtime/storage/temp"
  max_upload_size_mb: 2048
